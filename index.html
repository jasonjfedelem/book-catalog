<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Book Catalog</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@400;500;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:       #1a1a2e;
      --paper:     #f7f3ed;
      --spine:     #6b3a2a;
      --spine-lt:  #9c5a3c;
      --gold:      #c9973a;
      --success:   #2d6a4f;
      --error:     #9b2226;
      --muted:     #8a8070;
      --radius:    12px;
    }

    html, body {
      height: 100%;
      background: var(--ink);
      font-family: 'Inter', sans-serif;
      color: var(--ink);
      overscroll-behavior: none;
    }

    /* ── Layout shell ── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
      background: var(--paper);
    }

    /* ── Header ── */
    header {
      background: var(--spine);
      color: var(--paper);
      padding: 14px 20px 12px;
      display: flex;
      align-items: baseline;
      gap: 10px;
      flex-shrink: 0;
    }
    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.35rem;
      letter-spacing: 0.01em;
      line-height: 1;
    }
    header span {
      font-size: 0.72rem;
      color: #e0c9b8;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* ── Shelf row ── */
    #shelf-bar {
      background: #ede8e0;
      border-bottom: 1px solid #d8d0c4;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    #shelf-bar label {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      white-space: nowrap;
    }
    #shelf-input {
      flex: 1;
      border: 1.5px solid #c8bfb2;
      border-radius: 8px;
      padding: 7px 11px;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      background: var(--paper);
      color: var(--ink);
      outline: none;
      transition: border-color 0.15s;
    }
    #shelf-input:focus { border-color: var(--spine-lt); }
    #shelf-input::placeholder { color: #b0a898; }

    /* ── Camera area ── */
    #camera-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #111;
    }
    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    #canvas { display: none; }

    /* Viewfinder overlay */
    #viewfinder {
      position: absolute;
      inset: 0;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #viewfinder-box {
      width: 72%;
      aspect-ratio: 2/3;
      border: 2px solid rgba(255,255,255,0.55);
      border-radius: 10px;
      box-shadow: 0 0 0 2000px rgba(0,0,0,0.32);
    }

    /* ── Status banner ── */
    #status {
      position: absolute;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      padding: 9px 20px;
      border-radius: 30px;
      font-size: 0.88rem;
      font-weight: 500;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
      max-width: 90%;
      white-space: normal;
      text-align: center;
    }
    #status.show { opacity: 1; }
    #status.success { background: var(--success); color: #fff; }
    #status.error   { background: var(--error);   color: #fff; }
    #status.working { background: rgba(0,0,0,0.72); color: #fff; }

    /* ── Capture button ── */
    #capture-wrap {
      position: absolute;
      bottom: 24px;
      left: 0; right: 0;
      display: flex;
      justify-content: center;
    }
    #capture-btn {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 4px solid rgba(255,255,255,0.85);
      background: rgba(255,255,255,0.18);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    #capture-btn:active { background: rgba(255,255,255,0.38); transform: scale(0.94); }
    #capture-btn.busy { opacity: 0.45; pointer-events: none; }
    #capture-btn svg { width: 30px; height: 30px; fill: white; }

    /* ── Last entry strip ── */
    #last-entry {
      background: var(--spine);
      color: var(--paper);
      padding: 9px 16px;
      font-size: 0.8rem;
      min-height: 38px;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }
    #last-entry .label {
      color: #e0c9b8;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      white-space: nowrap;
    }
    #last-entry .value {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Permission / error screen ── */
    #error-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      height: 100%;
      padding: 32px;
      text-align: center;
      color: var(--muted);
    }
    #error-screen.show { display: flex; }
    #error-screen p { font-size: 0.95rem; line-height: 1.5; }
    #error-screen button {
      padding: 11px 28px;
      background: var(--spine);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
    }
  </style>
</head>
<body>
<div id="app">

  <header>
    <h1>Book Catalog</h1>
    <span>Library Scanner</span>
    <span style="margin-left:auto; font-size:0.62rem; color:#c4a882; opacity:0.8;">Built 2025-06-28 23:45</span>
  </header>

  <div id="shelf-bar">
    <label for="shelf-input">Shelf</label>
    <input id="shelf-input" type="text" placeholder="e.g. Living Room – Top" autocomplete="off" />
  </div>

  <div id="camera-wrap">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <div id="viewfinder">
      <div id="viewfinder-box"></div>
    </div>

    <div id="status"></div>

    <div id="capture-wrap">
      <button id="capture-btn" aria-label="Capture book">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="9"/>
        </svg>
      </button>
    </div>

    <div id="error-screen">
      <p id="error-msg">Camera access is needed to scan books.</p>
      <button id="retry-btn">Try Again</button>
    </div>
  </div>

  <div id="last-entry">
    <span class="label">Last —</span>
    <span class="value" id="last-value">Nothing scanned yet</span>
  </div>

</div>

// ─────────────────────────────────────────────

const video       = document.getElementById('video');
const canvas      = document.getElementById('canvas');
const captureBtn  = document.getElementById('capture-btn');
const statusEl    = document.getElementById('status');
const lastValue   = document.getElementById('last-value');
const shelfInput  = document.getElementById('shelf-input');
const errorScreen = document.getElementById('error-screen');
const errorMsg    = document.getElementById('error-msg');
const retryBtn    = document.getElementById('retry-btn');

let statusTimer = null;

// ── Camera ──────────────────────────────────
async function startCamera() {
  errorScreen.classList.remove('show');
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: false
    });
    video.srcObject = stream;
  } catch (e) {
    errorMsg.textContent = 'Camera access was denied. Please allow camera permission and try again.';
    errorScreen.classList.add('show');
  }
}

retryBtn.addEventListener('click', startCamera);
startCamera();

// ── Capture ──────────────────────────────────
captureBtn.addEventListener('click', async () => {
  const shelf = shelfInput.value.trim();
  if (!shelf) {
    showStatus('Enter a shelf description first.', 'error', 2500);
    shelfInput.focus();
    return;
  }

  captureBtn.classList.add('busy');
  showStatus('Reading book…', 'working');

  // Draw video frame to canvas
  canvas.width  = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);
  const base64Image = canvas.toDataURL('image/jpeg', 0.85).split(',')[1];

  try {
    const { title, author } = await extractBookInfo(base64Image);
    await appendToSheet(shelf, title, author);
    lastValue.textContent = `${title} — ${author}`;
    showStatus('✓ Saved', 'success', 1800);
  } catch (e) {
    console.error(e);
    showStatus(e.message || 'Something went wrong. Try again.', 'error', 3000);
  } finally {
    captureBtn.classList.remove('busy');
  }
});

// ── Anthropic OCR ────────────────────────────
async function extractBookInfo(base64Image) {
  const response = await fetch(CONFIG.WORKER_URL, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 256,
      messages: [{
        role: 'user',
        content: [
          {
            type: 'image',
            source: { type: 'base64', media_type: 'image/jpeg', data: base64Image }
          },
          {
            type: 'text',
            text: `Look at this book title page. Return ONLY a JSON object with exactly two keys: "title" and "author". 
Extract the book's full title and the author's name as it appears. 
If you cannot determine one of them, use the string "Unknown".
Do not include any explanation, markdown, or extra text — only the raw JSON object.
Example: {"title":"The Great Gatsby","author":"F. Scott Fitzgerald"}`
          }
        ]
      }]
    })
  });

  if (!response.ok) {
    const err = await response.json().catch(() => ({}));
    throw new Error(`API error ${response.status}: ${JSON.stringify(err)}`);
  }

  const data = await response.json();
  const text = data.content?.find(b => b.type === 'text')?.text?.trim() || '';

  try {
    const clean = text.replace(/```json|```/g, '').trim();
    return JSON.parse(clean);
  } catch {
    throw new Error('Could not read book info. Try a clearer photo.');
  }
}

// ── Google Sheets ────────────────────────────
// We use a signed JWT to get an access token from Google, then append a row.

async function appendToSheet(shelf, title, author) {
  const token = await getGoogleAccessToken();

  const url = `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SHEET_ID}/values/A:D:append?valueInputOption=RAW&insertDataOption=INSERT_ROWS`;

  const response = await fetch(url, {
    method: 'POST',
    headers: {
      'Authorization': `Bearer ${token}`,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      values: [[shelf, '', title, author]]
    })
  });

  if (!response.ok) {
    const err = await response.json().catch(() => ({}));
    throw new Error(`Sheet error: ${err.error?.message || response.status}`);
  }
}

// ── Google JWT / OAuth2 ──────────────────────
// Signs a JWT with the service account private key and exchanges it for an access token.

async function getGoogleAccessToken() {
  const now   = Math.floor(Date.now() / 1000);
  const claim = {
    iss:   CONFIG.SERVICE_ACCOUNT.client_email,
    scope: 'https://www.googleapis.com/auth/spreadsheets',
    aud:   'https://oauth2.googleapis.com/token',
    exp:   now + 3600,
    iat:   now
  };

  const jwt = await makeJWT(claim, CONFIG.SERVICE_ACCOUNT.private_key);

  const resp = await fetch('https://oauth2.googleapis.com/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({
      grant_type: 'urn:ietf:params:oauth:grant-type:jwt-bearer',
      assertion:  jwt
    })
  });

  if (!resp.ok) throw new Error('Google auth failed. Check service account credentials.');
  const data = await resp.json();
  return data.access_token;
}

async function makeJWT(claim, pemKey) {
  const header  = b64url(JSON.stringify({ alg: 'RS256', typ: 'JWT' }));
  const payload = b64url(JSON.stringify(claim));
  const signing = `${header}.${payload}`;

  const key = await importPrivateKey(pemKey);
  const sig  = await crypto.subtle.sign('RSASSA-PKCS1-v1_5', key, new TextEncoder().encode(signing));
  return `${signing}.${b64url(sig)}`;
}

function b64url(data) {
  if (typeof data === 'string') data = new TextEncoder().encode(data);
  const bytes = data instanceof ArrayBuffer ? new Uint8Array(data) : data;
  return btoa(String.fromCharCode(...bytes))
    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}

async function importPrivateKey(pem) {
  const stripped = pem
    .replace(/-----BEGIN PRIVATE KEY-----/, '')
    .replace(/-----END PRIVATE KEY-----/, '')
    .replace(/\s+/g, '');
  const binary = Uint8Array.from(atob(stripped), c => c.charCodeAt(0));
  return crypto.subtle.importKey(
    'pkcs8', binary.buffer,
    { name: 'RSASSA-PKCS1-v1_5', hash: 'SHA-256' },
    false, ['sign']
  );
}

// ── Status helper ────────────────────────────
function showStatus(msg, type, duration) {
  clearTimeout(statusTimer);
  statusEl.textContent = msg;
  statusEl.className   = `show ${type}`;
  if (duration) {
    statusTimer = setTimeout(() => { statusEl.className = ''; }, duration);
  }
}
